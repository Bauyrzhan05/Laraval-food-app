services:
  - type: web
    name: food-laravel
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Laravel
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false          # Render dashboard-тан қолмен енгізіңіз
      - key: APP_URL
        sync: false          # Render берген URL-ді енгізіңіз

      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: food-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: food-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: food-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: food-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: food-db
          property: password

      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      # Mail (Mailtrap credentials)
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: sandbox.smtp.mailtrap.io
      - key: MAIL_PORT
        value: 2525
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        value: bauyrzhan@food.kz
      - key: MAIL_FROM_NAME
        value: "Food Bauyrzhan"

      - key: APP_LOCALE
        value: en
      - key: APP_FALLBACK_LOCALE
        value: en

databases:
  - name: food-db
    plan: free
    databaseName: food_db